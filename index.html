<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Fem 🤍</title>
    <link rel="stylesheet" href="style9.css">
</head>
<body>

<!-- Background -->
<div class="bg-image"></div>

<!-- Sliding Pictures -->
<div class="slideshow">
    <img src="pic1.jpg" class="slide left">
    <img src="pic2.jpg" class="slide right">
    <img src="pic3.jpg" class="slide left">
</div>

<!-- Hearts -->
<div class="hearts"></div>

<!-- Main -->
<div class="container">
    <h1 class="title">For Fem 🤍</h1>

    <div class="envelope" id="envelope">
        <div class="flap"></div>

        <div class="letter">
            <h2>I'm Sorry, Love</h2>
            <p id="text"></p>
        </div>
    </div>

    <button id="openBtn">Open Letter 💌</button>
</div>

<script src="script.js"></script>
</body>
</html>
